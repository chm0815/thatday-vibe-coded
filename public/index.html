<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>thatday</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="dist/flatpickr.min.css" />
  </head>
  <body>
    <script>
      // Apply saved theme before render to avoid flash
      const t = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
      const m = document.querySelector('meta[name="theme-color"]');
      if (m) m.content = t === "light" ? "#f5f3ef" : "#0f0f0f";
    </script>
    <div id="offline-banner" class="offline-banner" hidden>You are offline — viewing cached data</div>
    <header>
      <div class="header-top">
        <span id="user-greeting" class="user-greeting"></span>
        <button id="theme-toggle" class="btn-theme" title="Toggle light/dark mode"></button>
        <button id="logout-btn" class="btn-logout">Log out</button>
      </div>
      <h1>thatday</h1>
      <p class="subtitle">One photo. One headline. Every day.</p>
      <button id="add-btn" class="btn-primary">+ Add a Day</button>
      <label class="filter-toggle">
        <input type="checkbox" id="entries-only" />
        <span>Entries only</span>
      </label>
    </header>

    <main id="grid" class="grid"></main>

    <div id="empty-state" class="empty-state" hidden>
      <p>No entries yet. Add your first day!</p>
    </div>

    <!-- Add / Edit Modal -->
    <div id="modal-overlay" class="modal-overlay" hidden>
      <div class="modal">
        <button id="modal-close" class="modal-close">&times;</button>
        <h2 id="modal-title">Add a Day</h2>
        <form id="entry-form">
          <input type="hidden" id="entry-id" />

          <label for="entry-date">Date</label>
          <input type="date" id="entry-date" required />

          <label for="entry-headline">Headline <span id="char-count" class="char-count">(0 / 300)</span></label>
          <input
            type="text"
            id="entry-headline"
            maxlength="300"
            placeholder="What happened that day?"
            required
          />

          <label>Photo</label>
          <div class="photo-buttons">
            <button type="button" id="photo-camera-btn" class="btn-secondary photo-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              Foto aufnehmen
            </button>
            <button type="button" id="photo-gallery-btn" class="btn-secondary photo-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Aus Galerie
            </button>
          </div>
          <input type="file" id="entry-photo" accept="image/*" hidden />
          <div id="photo-preview" class="photo-preview" hidden>
            <img id="preview-img" src="" alt="Preview" />
          </div>

          <button type="submit" class="btn-primary" id="submit-btn">Save</button>
          <p id="form-error" class="form-error" hidden></p>
        </form>
      </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-overlay" class="modal-overlay" hidden>
      <button id="detail-prev" class="detail-nav detail-nav-left" title="Previous">&#8249;</button>
      <div class="modal modal-detail">
        <button id="detail-close" class="modal-close">&times;</button>
        <div id="detail-img-container" class="detail-img-container">
          <img id="detail-img" src="" alt="" class="detail-img" />
          <div id="magnifier" class="magnifier" hidden></div>
        </div>
        <div id="detail-photo-upload" class="detail-photo-upload" hidden>
          <p>No photo yet</p>
          <div class="photo-buttons">
            <button id="detail-add-camera-btn" class="btn-secondary photo-btn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              Foto aufnehmen
            </button>
            <button id="detail-add-gallery-btn" class="btn-secondary photo-btn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Aus Galerie
            </button>
          </div>
          <input type="file" id="detail-photo-input" accept="image/*" hidden />
        </div>
        <div class="detail-photo-actions" id="detail-photo-actions" hidden>
          <div class="photo-buttons">
            <button id="detail-replace-camera-btn" class="btn-secondary photo-btn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              Foto aufnehmen
            </button>
            <button id="detail-replace-gallery-btn" class="btn-secondary photo-btn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Aus Galerie
            </button>
          </div>
          <input type="file" id="detail-replace-photo-input" accept="image/*" hidden />
        </div>
        <p id="detail-photo-error" class="form-error detail-photo-error" hidden></p>
        <div class="detail-info">
          <h2 id="detail-headline" class="editable" title="Click to edit"></h2>
          <input type="text" id="detail-headline-input" class="detail-headline-input" maxlength="300" hidden />
          <p id="detail-date" class="detail-date"></p>
        </div>
        <div class="detail-actions">
          <button id="detail-delete" class="btn-danger">Delete</button>
        </div>
      </div>
      <button id="detail-next" class="detail-nav detail-nav-right" title="Next">&#8250;</button>
    </div>

    <!-- Camera Capture Modal -->
    <div id="camera-overlay" class="modal-overlay" hidden>
      <div class="modal camera-modal">
        <button id="camera-close" class="modal-close">&times;</button>
        <h2>Foto aufnehmen</h2>
        <div class="camera-viewfinder">
          <video id="camera-video" autoplay playsinline></video>
          <canvas id="camera-canvas" hidden></canvas>
          <img id="camera-preview" hidden alt="Captured photo" />
          <p id="camera-error" class="form-error" hidden></p>
        </div>
        <div class="camera-controls">
          <div id="camera-live-controls" class="camera-btn-row">
            <button type="button" id="camera-switch-btn" class="btn-secondary camera-ctrl-btn" title="Kamera wechseln">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
            <button type="button" id="camera-capture-btn" class="btn-primary camera-shutter">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
            </button>
            <div class="camera-ctrl-spacer"></div>
          </div>
          <div id="camera-review-controls" class="camera-btn-row" hidden>
            <button type="button" id="camera-retake-btn" class="btn-secondary">Nochmal</button>
            <button type="button" id="camera-use-btn" class="btn-primary">Verwenden</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay" class="modal-overlay" hidden>
      <div class="modal confirm-modal">
        <h2 id="confirm-title">Are you sure?</h2>
        <p id="confirm-message" class="confirm-message"></p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn-secondary">Cancel</button>
          <button id="confirm-ok" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <script src="dist/flatpickr.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
